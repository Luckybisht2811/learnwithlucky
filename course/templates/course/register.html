{% extends 'course/base.html' %}
{% load static %}

{% block title %}Register|LearnWithLucky{% endblock title %}


{% block maincontent %}

<section class="min-h-screen flex items-center justify-center bg-gray-100">

    <div class="bg-white shadow-lg rounded-2xl p-8 w-full max-w-md">

        <!-- Title -->
        <h2 class="text-3xl font-bold text-center text-gray-800">
            Create Account 🚀
        </h2>

        <p class="text-gray-500 text-center mt-2">
            Join LearnWithLucky and start learning
        </p>

        <!-- Form -->
        <form method="POST" class="mt-6 space-y-5">
            {% csrf_token %}

            <!-- Username -->
            <div>
                <label class="block text-gray-700 mb-1">Username</label>
                <input type="text" name="username" required
                    class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none"
                    placeholder="Enter username">
            </div>

            <!-- Email -->
            <div>
                <label class="block text-gray-700 mb-1">Email</label>
                <input type="email" name="email" required
                    class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none"
                    placeholder="Enter email">
            </div>

            <!-- Password -->
            <div>
                <label class="block text-gray-700 mb-1">Password</label>
                <input type="password" name="password" required
                    class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none"
                    placeholder="Enter password">
            </div>

            <!-- Confirm Password -->
            <div>
                <label class="block text-gray-700 mb-1">Confirm Password</label>
                <input type="password" name="confirm_password" required
                    class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none"
                    placeholder="Confirm password">
            </div>
            {% if error %}
            <div class="bg-red-100 text-red-600 px-4 py-2 rounded-lg text-sm text-center">
                {{ error }}
            </div>
            {% endif %}
            <!-- Button -->
            <button type="submit"
                class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition">
                Register
            </button>

        </form>

        <!-- Login Redirect -->
        <p class="text-center text-gray-500 mt-6">
            Already have an account?
            <a href="{% url 'login' %}" class="text-blue-600 font-semibold hover:underline">
                Login
            </a>
        </p>

    </div>

</section>

{% endblock %}
