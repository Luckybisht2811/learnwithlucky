{% extends 'course/base.html' %}
{% block title %}{{ course.title }} | LearnWithLucky{% endblock %}

{% block maincontent %}

<div class="max-w-5xl mx-auto px-6 py-12">

    <!-- Back Button -->
    <a href="{% url 'courses' %}" class="text-blue-500 hover:underline text-sm mb-6 inline-block">
        ← Back to Courses
    </a>

    <!-- Course Title -->
    <h1 class="text-3xl font-bold mb-2">{{ course.title }}</h1>

    <!-- Category Badge -->
    <span class="text-xs bg-blue-100 text-blue-600 px-3 py-1 rounded-full font-medium">
        {{ course.category }}
    </span>

    <!-- Video Player -->
    <div class="mt-6 bg-black rounded-2xl overflow-hidden shadow-xl">
        <video 
            controls 
            class="w-full"
            style="max-height: 500px;">
            <source src="{{ course.video.url }}" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>

    <!-- Description -->
    <div class="mt-6 bg-white rounded-2xl shadow p-6">
        <h2 class="text-xl font-semibold mb-2">About this Course</h2>
        <p class="text-gray-500 leading-relaxed">{{ course.description }}</p>
    </div>

</div>

{% endblock %}
